<div class="documents-upload-page">
  <div class="app-route-fade-target">
    <header class="documents-upload-page__appbar">
      <button type="button" class="documents-upload-page__back" aria-label="Back" (click)="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
          />
        </svg>
      </button>
      <h1 class="documents-upload-page__title">Upload Documents</h1>
    </header>

    <main class="documents-upload-page__main">
      <input
        #fileInput
        type="file"
        class="documents-upload-page__file-input"
        accept=".jpg,.jpeg,.png,.pdf,image/jpeg,image/png,application/pdf"
        multiple
        (change)="onFileSelected()"
      />

      <p class="documents-upload-page__desc">
        Upload your documents so we can organise them under your documents and policies hub.
      </p>

      <button
        type="button"
        class="documents-upload-page__dropzone"
        aria-label="Upload files"
        (click)="openFilePicker()"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
      >
        <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#99A1AF"
            d="M5 20q-.825 0-1.412-.587Q3 18.825 3 18v-3h2v3h14v-3h2v3q0 .825-.588 1.413Q19.825 20 19 20Zm6-4V7.85l-2.4 2.4L7.175 8.825 12 4l4.825 4.825-1.425 1.425-2.4-2.4V16Z"
          />
        </svg>
        <p class="documents-upload-page__drop-main">Drop files here or click to upload</p>
        <p class="documents-upload-page__drop-sub">
          Supports: Images (JPG, PNG) and PDF documents.<br />
          Max 5MB per file
        </p>
      </button>

      <div class="documents-upload-page__hint">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#5B7CFF"
            d="M9.5 2 11 7.5 16.5 9 11 10.5 9.5 16 8 10.5 2.5 9 8 7.5 9.5 2Zm9 5 1 3.5L23 12l-3.5 1.5L18.5 17 17 13.5 13.5 12 17 10.5 18.5 7Z"
          />
        </svg>
        <p>We'll automatically extract details so you don't have to fill everything manually.</p>
      </div>
    </main>
  </div>
</div>
