<div class="quotation-page quotation-page--step-two">
  <div class="app-route-fade-target quotation-page__fade">
    <div class="quotation-page__chrome">
      <header class="quotation-page__brand-bar" aria-label="PolicyStreet">
        <img class="quotation-page__logo" [src]="logoBrandSrc" width="153" height="40" alt="PolicyStreet" />
        <button type="button" class="quotation-page__notify" [attr.aria-label]="'Notifications'" (click)="goNotifications()">
          <svg class="quotation-page__notify-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M5.00024 19.0005C4.71691 19.0005 4.47941 18.9047 4.28774 18.713C4.09608 18.5213 4.00024 18.2838 4.00024 18.0005C4.00024 17.7172 4.09608 17.4797 4.28774 17.288C4.47941 17.0963 4.71691 17.0005 5.00024 17.0005H6.00024V10.0005C6.00024 8.61716 6.41691 7.38799 7.25024 6.31299C8.08358 5.23799 9.16691 4.53382 10.5002 4.20049V3.50049C10.5002 3.08382 10.6461 2.72965 10.9377 2.43799C11.2294 2.14632 11.5836 2.00049 12.0002 2.00049C12.4169 2.00049 12.7711 2.14632 13.0627 2.43799C13.3544 2.72965 13.5002 3.08382 13.5002 3.50049V4.20049C14.8336 4.53382 15.9169 5.23799 16.7502 6.31299C17.5836 7.38799 18.0002 8.61716 18.0002 10.0005V17.0005H19.0002C19.2836 17.0005 19.5211 17.0963 19.7127 17.288C19.9044 17.4797 20.0002 17.7172 20.0002 18.0005C20.0002 18.2838 19.9044 18.5213 19.7127 18.713C19.5211 18.9047 19.2836 19.0005 19.0002 19.0005H5.00024ZM12.0002 22.0005C11.4502 22.0005 10.9794 21.8047 10.5877 21.413C10.1961 21.0213 10.0002 20.5505 10.0002 20.0005H14.0002C14.0002 20.5505 13.8044 21.0213 13.4127 21.413C13.0211 21.8047 12.5502 22.0005 12.0002 22.0005ZM8.00024 17.0005H16.0002V10.0005C16.0002 8.90049 15.6086 7.95882 14.8252 7.17549C14.0419 6.39216 13.1002 6.00049 12.0002 6.00049C10.9002 6.00049 9.95858 6.39216 9.17524 7.17549C8.39191 7.95882 8.00024 8.90049 8.00024 10.0005V17.0005Z"
            />
          </svg>
          <span class="quotation-page__notify-dot" aria-hidden="true"></span>
        </button>
      </header>

      <div class="quotation-page__appbar" role="banner" aria-label="Get new quote navigation">
        <button type="button" class="quotation-page__back" aria-label="Back" (click)="goBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
          </svg>
        </button>
        <h1 class="quotation-page__title">Get New Quote</h1>
      </div>

      <div class="quotation-page__progress" aria-label="Quote progress">
        <div class="quotation-page__progress-bar" aria-hidden="true">
          <div class="quotation-page__progress-active quotation-page__progress-active--step-two"></div>
          <div class="quotation-page__progress-track quotation-page__progress-track--step-two"></div>
          <div class="quotation-page__progress-stop"></div>
        </div>
        <div class="quotation-page__progress-meta">
          <span class="quotation-page__step">Step 2</span>
          <span class="quotation-page__step-total">of Step <em>X</em></span>
        </div>
      </div>
    </div>

    <main class="quotation-page__main quotation-page__main--step-two">
      <section class="quotation-page__intro" aria-label="Vehicle selection intro">
        <h2>Select Your Vehicle</h2>
        <p>Please select the vehicle you wish to insure or renew.</p>
      </section>

      <section class="quotation-vehicle-list" aria-label="Vehicle options">
        @for (vehicle of vehicles(); track vehicle.id) {
          <button
            type="button"
            class="quotation-vehicle"
            [class.quotation-vehicle--selected]="selectedVehicleId() === vehicle.id"
            (click)="selectVehicle(vehicle.id)"
          >
            <span class="quotation-vehicle__thumb">
              <img [src]="vehicle.imageSrc" width="50" height="47" alt="" aria-hidden="true" />
            </span>
            <span class="quotation-vehicle__copy">
              <span class="quotation-vehicle__plate">{{ vehicle.plate }}</span>
              <span class="quotation-vehicle__model">{{ vehicle.model }}</span>
            </span>
            <span class="quotation-vehicle__radio" [class.quotation-vehicle__radio--checked]="selectedVehicleId() === vehicle.id" aria-hidden="true"></span>
          </button>
        }
      </section>

      <div class="quotation-cta quotation-cta--step-two">
        <button type="button" class="quotation-cta__btn quotation-cta__btn--disabled" [disabled]="!canContinue()" (click)="continue()">
          Continue
        </button>
        <div class="quotation-cta__safe">
          <svg class="quotation-cta__safe-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v7a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-7a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5Zm-3 8V7a3 3 0 1 1 6 0v3H9Zm3 4a2 2 0 0 1 1 3.732V19h-2v-1.268A2 2 0 0 1 12 14Z"
            />
          </svg>
          <span>Your data is safe with us</span>
        </div>
      </div>
    </main>

    <a class="quotation-page__whatsapp" href="https://wa.me/" target="_blank" rel="noopener noreferrer" aria-label="Contact us on WhatsApp">
      <span class="quotation-page__whatsapp-inner">
        <svg width="32" height="32" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#fff"
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
          />
        </svg>
      </span>
    </a>
  </div>
</div>
