<div class="notifications-page">
  <div class="app-route-fade-target">
  <div class="notifications-page__chrome">
    <header class="notifications-page__brand-bar" aria-label="PolicyStreet">
      <img
        class="notifications-page__logo"
        [src]="logoBrandSrc"
        width="153"
        height="40"
        alt="PolicyStreet"
      />
    </header>

    <div class="notifications-page__appbar">
      <button type="button" class="notifications-page__icon-btn" aria-label="Back" (click)="goBack()">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="#3d3d3d"
            d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"
          />
        </svg>
      </button>
      <h1 class="notifications-page__title">Notifications</h1>
      <button type="button" class="notifications-page__icon-btn notifications-page__icon-btn--trailing" aria-label="More options">
        <svg width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="5" r="1.75" fill="#3d3d3d" />
          <circle cx="12" cy="12" r="1.75" fill="#3d3d3d" />
          <circle cx="12" cy="19" r="1.75" fill="#3d3d3d" />
        </svg>
      </button>
    </div>
  </div>

  <main class="notifications-page__main">
    <section class="notifications-page__chips" aria-label="Notification categories">
      <button
        type="button"
        class="notifications-page__chip"
        [class.notifications-page__chip--active]="activeChip() === 'all'"
        (click)="setChip('all')"
      >
        All
      </button>
      <button
        type="button"
        class="notifications-page__chip"
        [class.notifications-page__chip--active]="activeChip() === 'billing'"
        (click)="setChip('billing')"
      >
        Billings &amp; Payments
      </button>
      <button
        type="button"
        class="notifications-page__chip"
        [class.notifications-page__chip--active]="activeChip() === 'campaigns'"
        (click)="setChip('campaigns')"
      >
        Campaigns &amp; Promotions
      </button>
      <button
        type="button"
        class="notifications-page__chip"
        [class.notifications-page__chip--active]="activeChip() === 'reminders'"
        (click)="setChip('reminders')"
      >
        Reminders
      </button>
    </section>

    <section class="notifications-page__list" aria-label="Notification list">
      @for (item of filteredNotifications(); track item.id) {
        <article
          role="button"
          tabindex="0"
          class="notifications-page__item"
          [class.notifications-page__item--unread-info]="isUnreadNormalAccent(item)"
          [class.notifications-page__item--unread-attention]="isUnreadAttentionAccent(item)"
          [class.notifications-page__item--read]="isRead(item)"
          (click)="markAsRead(item)"
          (keydown.enter)="markAsRead(item)"
          (keydown.space)="$event.preventDefault(); markAsRead(item)"
        >
          <div class="notifications-page__item-copy">
            <h2 class="notifications-page__item-title">{{ item.title }}</h2>
            <p class="notifications-page__item-body">{{ item.body }}</p>
          </div>
          @if (isUnread(item)) {
            <span class="notifications-page__dot" aria-hidden="true"></span>
          }
        </article>
      }
    </section>
  </main>

  </div>
</div>
